on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "pv_docs/**"
      - "site/**"
      - "wiki/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "pv_docs/**"
      - "site/**"
      - "wiki/**"
      - ".github/ISSUE_TEMPLATE/**"

name: CI Build Flatpak

permissions: read-all

jobs:
  flatpak:
    name: "Flatpak"
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        manifest: [dev.nicx.mimick.local.yml, dev.nicx.mimick.yml]
        variant:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
        exclude:
          # Only test the non-local manifest on x86_64 to save CI time,
          # as it just downloads the remote tag instead of local source
          - manifest: dev.nicx.mimick.yml
            variant: { arch: aarch64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check if non-local manifest version or commit hash changed
        id: check_version
        if: matrix.manifest == 'dev.nicx.mimick.yml'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="$PR_BASE_SHA"
          else
            BASE_SHA="$PUSH_BEFORE_SHA"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "No base SHA available — treating as no version change."
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff "$BASE_SHA" HEAD -- dev.nicx.mimick.yml | grep -Eq '^[+-][[:space:]]+(tag|commit):'; then
            echo "Non-local manifest tag/commit changed — build will run."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Non-local manifest tag/commit unchanged — skipping build."
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Flatpak
        if: matrix.manifest == 'dev.nicx.mimick.local.yml' || steps.check_version.outputs.version_changed == 'true'
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6.7
        with:
          bundle: mimick.flatpak
          manifest-path: ${{ matrix.manifest }}
          cache-key: flatpak-builder-${{ matrix.manifest }}-${{ matrix.variant.arch }}-${{ hashFiles(matrix.manifest, 'Cargo.lock', 'cargo-sources.json') }}
          arch: ${{ matrix.variant.arch }}
          verbose: true
