name: "CodeQL Analysis"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "wiki/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "roadmap.md"
  schedule:
    - cron: "30 2 * * 1"
    - cron: "30 2 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  analyze:
    name: Analyze (Rust)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Populate Cargo registry with dependency source
        # Per docs.codeql.github.com, Rust analysis needs cargo + dependency
        # source available so the extractor can resolve cross-crate calls.
        run: cargo fetch --locked

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          category: "/language:rust"
