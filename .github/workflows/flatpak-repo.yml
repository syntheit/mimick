name: Deploy Site

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  build-repo:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install system dependencies
        # Full upgrade first, then install — Arch disallows partial upgrades.
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed gtk4 libadwaita glib2 pkgconf base-devel libsecret git gexiv2 libheif

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare site directory
        run: mkdir -p public

      - name: Copy landing page assets
        run: |
          cp site/index.html public/index.html
          cp site/styles.css public/styles.css
          cp site/icon.png public/icon.png
          cp site/robots.txt public/robots.txt
          cp site/sitemap.xml public/sitemap.xml
          cp -r docs/screenshots public/screenshots
          cp -r site/fonts public/fonts

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build Rust API documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --locked --no-deps --document-private-items

      - name: Stage Rust docs under /docs
        run: |
          mkdir -p public/docs
          cp -r target/doc/. public/docs/
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=mimick/index.html">\n' \
            > public/docs/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public

  deploy-pages:
    needs: build-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
