name: Deploy Site

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-deprecation"

jobs:
  build-repo:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare site directory
        run: mkdir -p public

      - name: Copy landing page assets
        run: |
          cp site/index.html public/index.html
          cp site/styles.css public/styles.css
          cp site/icon.png public/icon.png
          cp site/robots.txt public/robots.txt
          cp site/sitemap.xml public/sitemap.xml
          cp -r docs/screenshots public/screenshots

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public

  deploy-pages:
    needs: build-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
