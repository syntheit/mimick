app-id: dev.nicx.mimick
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: mimick

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/mimick/cargo

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --talk-name=org.kde.StatusNotifierWatcher
  - --share=network

modules:
  - name: exiv2
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DEXIV2_ENABLE_BMFF=ON
      - -DEXIV2_BUILD_SAMPLES=OFF
      - -DEXIV2_BUILD_EXIV2_COMMAND=OFF
      - -DEXIV2_ENABLE_INIH=OFF
    sources:
      - type: archive
        url: https://github.com/Exiv2/exiv2/archive/refs/tags/v0.28.8.tar.gz
        sha256: ea51b0609f58a9afa063b60daa1539948b62247721e154f4fff0ad3aec9f9756

  - name: gexiv2
    buildsystem: meson
    config-opts:
      - -Dintrospection=false
      - -Dvapi=false
      - -Dpython3=false
      - -Dtests=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gexiv2/0.14/gexiv2-0.14.6.tar.xz
        sha256: 606c28aaae7b1f3ef5c8eabe5e7dffd7c5a1c866d25b7671fb847fe287a72b8b

  - name: mimick
    buildsystem: simple
    build-commands:
      - mv cargo/config cargo/config.toml
      - cargo --offline build --release
      - install -Dm755 target/release/mimick /app/bin/mimick
      - install -Dm644 setup/dev.nicx.mimick.desktop /app/share/applications/dev.nicx.mimick.desktop
      - install -Dm644 src/assets/icon.svg /app/share/icons/hicolor/scalable/apps/dev.nicx.mimick.svg
      - install -Dm644 src/assets/256x256/apps/dev.nicx.mimick.png /app/share/icons/hicolor/256x256/apps/dev.nicx.mimick.png
      - install -Dm644 src/assets/512x512/apps/dev.nicx.mimick.png /app/share/icons/hicolor/512x512/apps/dev.nicx.mimick.png
      - install -Dm644 setup/metainfo/dev.nicx.mimick.metainfo.xml /app/share/metainfo/dev.nicx.mimick.metainfo.xml

    sources:
      - type: git
        url: https://github.com/nicx17/mimick.git
        tag: v9.5.4
        commit: fe72c48d798505f8a58ea096a46417c7dbd0bb1f
      - cargo-sources.json
